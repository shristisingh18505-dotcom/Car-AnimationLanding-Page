<!DOCTYPE html>
<html lang="en">
<head>

    <title>Car Slider Animation</title>

<body>

<div class="slider">

    <div class="slide active">
        <div class="content">ssssssssss

        </div>
        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800" alt="">
    </div>

    <div class="slide">
        <div class="content">
            <h1>Luxury Sedan</h1>
            <p>Comfort, performance, and style combined.</p>
            <button>Explore More</button>
        </div>
        <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=800" alt="">
    </div>

    <div class="slide">
        <div class="content">
            <h1>Sports Car</h1>

            <button>Explore More</button>
        </div>
        <img src="https://images.unsplash.com/photo-1553440569-bcc63803a83d?w=800" alt="">
    </div>

    <div class="buttons">
        <button id="prev">❮</button>
        <button id="next">❯</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
